<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<title>Buku Tamu Digital</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#3a7bd5">

<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-status-bar-style" content="default">

<meta name="mobile-web-app-capable" content="yes">

<link rel="apple-touch-icon"
href="https://cdn-icons-png.flaticon.com/512/747/747376.png">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/@sweetalert2/theme-bootstrap-4/bootstrap-4.css" rel="stylesheet">

<style>

body {
  background: linear-gradient(135deg, #e0eafc, #cfdef3);
  min-height: 100vh;
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  padding: 0;
}

.card-kustom {
  border-radius: 20px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.08);
  border: none;
  background: #ffffff;
}

.btn-gradient {
  background: linear-gradient(45deg, #3a7bd5, #3a6073);
  color: white;
  border: none;
  transition: all 0.3s ease;
}

.btn-gradient:hover {
  background: linear-gradient(45deg, #3a6073, #3a7bd5);
  color: white;
  transform: translateY(-2px);
}

.badge-time {
  font-size: 0.75rem;
  background-color: #f1f3f5;
  color: #495057;
  font-weight: 500;
}

.list-item-tamu {
  border-left: 5px solid #3a7bd5;
  transition: all 0.2s ease;
}

.form-control {
  border-radius: 12px;
}

@media(max-width:768px){

  .container{
    padding-left: 10px;
    padding-right: 10px;
  }

  .card-kustom{
    border-radius: 16px;
  }

}

</style>

</head>

<body>

<div class="container my-4">

  <!-- FORM TAMU -->

  <div id="wrapperTamu" class="row justify-content-center">

    <div class="col-md-6">

      <div class="card card-kustom p-4">

        <div class="text-center mb-4">

          <div class="p-3 bg-light d-inline-block rounded-circle mb-2 shadow-sm">
            📋
          </div>

          <h3 class="fw-bold text-dark m-0">
            Buku Tamu Digital
          </h3>

          <p class="text-muted small">
            Silakan isi data kunjungan Anda dengan benar
          </p>

        </div>

        <form id="guestForm" onsubmit="handleFormSubmit(event)">

          <div class="mb-3">

            <label class="form-label fw-semibold text-secondary">
              Nama Lengkap
            </label>

            <input
              type="text"
              class="form-control form-control-lg bg-light"
              id="nama"
              required>

          </div>

          <div class="mb-3">

            <label class="form-label fw-semibold text-secondary">
              Instansi / Perusahaan
            </label>

            <input
              type="text"
              class="form-control form-control-lg bg-light"
              id="instansi"
              required>

          </div>

          <div class="mb-3">

            <label class="form-label fw-semibold text-secondary">
              Maksud / Keperluan
            </label>

            <textarea
              class="form-control form-control-lg bg-light"
              id="keperluan"
              rows="2"
              required></textarea>

          </div>

          <div class="mb-3">

            <label class="form-label fw-semibold text-secondary">
              Nomor WhatsApp
            </label>

            <input
              type="tel"
              class="form-control form-control-lg bg-light"
              id="whatsapp"
              required>

          </div>

          <button
            type="submit"
            class="btn btn-gradient btn-lg w-100 fw-bold shadow"
            id="submitBtn">

            Kirim Data

          </button>

        </form>

        <div class="text-center d-none my-4" id="loadingSpinner">

          <div class="spinner-grow text-primary" role="status"></div>

          <p class="mt-2 text-muted fw-medium">
            Sedang mencatat...
          </p>

        </div>

        <hr class="mt-4 text-muted">

        <div class="text-center">

          <button
            class="btn btn-link btn-sm text-decoration-none text-muted fw-medium"
            onclick="bukaLoginOperator()">

            🔒 Masuk Area Operator

          </button>

        </div>

      </div>

    </div>

  </div>

  <!-- LOGIN -->

  <div id="wrapperLogin"
       class="row justify-content-center d-none">

    <div class="col-md-4">

      <div class="card card-kustom p-4 text-center shadow-lg">

        <h4 class="fw-bold text-dark mb-2">
          Verifikasi Operator
        </h4>

        <p class="text-muted small mb-4">
          Masukkan PIN Keamanan
        </p>

        <input
          type="password"
          id="pinInput"
          class="form-control form-control-lg text-center mb-3 border-2"
          placeholder="••••"
          style="letter-spacing:0.5rem;font-weight:bold;">

        <button
          class="btn btn-dark btn-lg w-100 mb-2 fw-bold"
          onclick="loginOperator()">

          Masuk

        </button>

        <button
          class="btn btn-link text-secondary btn-sm text-decoration-none"
          onclick="kembaliKeTamu()">

          Kembali

        </button>

      </div>

    </div>

  </div>

  <!-- DASHBOARD -->

  <div id="wrapperDashboard"
       class="row justify-content-center d-none">

    <div class="col-md-8">

      <div class="card card-kustom p-4 mb-3 bg-white">

        <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">

          <div>

            <h4 class="fw-bold text-dark m-0">
              📋 Panel Kontrol Operator
            </h4>

            <p class="text-muted small m-0">
              Data realtime langsung dari basis data
            </p>

          </div>

          <div class="d-flex gap-2">

            <button
              class="btn btn-sm btn-outline-danger fw-bold rounded-pill px-3"
              onclick="aksiHapusSemua()">

              🗑️ Kosongkan Semua

            </button>

            <button
              class="btn btn-sm btn-secondary fw-bold rounded-pill px-3"
              onclick="kembaliKeTamu()">

              Keluar

            </button>

          </div>

        </div>

      </div>

      <!-- SEARCH -->

      <div class="mb-3">

        <input
          type="text"
          id="searchInput"
          class="form-control"
          placeholder="🔍 Cari nama, instansi, WA..."
          onkeyup="cariData()">

      </div>

      <!-- LIST -->

      <div id="containerListTamu"></div>

    </div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>


/* =========================
   SUBMIT FORM
========================= */

/* =======================================================
   FUNGSI SUBMIT FORMULIR (OLEH OPERATOR) + SUARA INSTAN
======================================================= */
function handleFormSubmit(event) {
  event.preventDefault();

  document
    .getElementById('guestForm')
    .classList.add('d-none');

  document
    .getElementById('loadingSpinner')
    .classList.remove('d-none');

  var nama =
    document.getElementById('nama').value;

  var instansi =
    document.getElementById('instansi').value;

  var keperluan =
    document.getElementById('keperluan').value;

  var whatsapp =
    document.getElementById('whatsapp').value;

  google.script.run
    .withSuccessHandler(function(res){
      if(res === "SUKSES"){

        // 🔊 PANGGIL SUARA ROBOT DI SINI (Menyebutkan nama tamu yang baru diinput)
        mainkanSuaraLangsung(nama);

        Swal.fire({
          icon:'success',
          title:'Berhasil Tercatat!',
          text: 'Data tamu atas nama ' + nama + ' sudah tersimpan.',
          confirmButtonColor:'#3a7bd5'
        }).then(()=>{
          resetFormTamu();
        });

      } else {
        Swal.fire({
          icon:'error',
          title:'Gagal',
          text:res
        });
        resetFormTamu();
      }
    })
    .simpanDataTamu(
      nama,
      instansi,
      keperluan,
      whatsapp
    );
}

/* =======================================================
   FUNGSI SUARA ROBOT (BERBUNYI LANGSUNG SETELAH SIMPAN)
======================================================= */
function mainkanSuaraLangsung(namaTamu) {
  // 1. Efek Bunyi Bel "Ding" Manis
  var context = new (window.AudioContext || window.webkitAudioContext)();
  var oscillator = context.createOscillator();
  var gainNode = context.createGain();
  
  oscillator.connect(gainNode);
  gainNode.connect(context.destination);
  oscillator.type = 'sine';
  oscillator.frequency.setValueAtTime(587.33, context.currentTime); // Nada D5
  gainNode.gain.setValueAtTime(0.5, context.currentTime);
  gainNode.gain.exponentialRampToValueAtTime(0.01, context.currentTime + 0.4);
  
  oscillator.start();
  oscillator.stop(context.currentTime + 0.4);

  // 2. Efek Suara Robot Berbicara Bahasa Indonesia (Jeda 0,5 Detik setelah Bel)
  setTimeout(function() {
    if ('speechSynthesis' in window) {
      var teks = "Data berhasil disimpan. Tamu atas nama, " + namaTamu;
      var ruteSuara = new SpeechSynthesisUtterance(teks);
      
      ruteSuara.lang = 'id-ID'; // Menggunakan suara bahasa Indonesia asli browser
      ruteSuara.rate = 1.0;     // Kecepatan normal
      ruteSuara.pitch = 1.0;    // Nada normal
      
      window.speechSynthesis.speak(ruteSuara);
    }
  }, 500);
}

/* =========================
   RESET
========================= */

function resetFormTamu(){

  document.getElementById('guestForm').reset();

  document
    .getElementById('guestForm')
    .classList.remove('d-none');

  document
    .getElementById('loadingSpinner')
    .classList.add('d-none');

  document
    .getElementById('wrapperTamu')
    .classList.remove('d-none');

  document
    .getElementById('wrapperLogin')
    .classList.add('d-none');

  document
    .getElementById('wrapperDashboard')
    .classList.add('d-none');

}

/* =========================
   LOGIN
========================= */

function bukaLoginOperator(){

  document
    .getElementById('wrapperTamu')
    .classList.add('d-none');

  document
    .getElementById('wrapperLogin')
    .classList.remove('d-none');

  document
    .getElementById('pinInput')
    .focus();

}

function kembaliKeTamu() {

  // reset semua tampilan
  resetFormTamu();

  // kosongkan PIN
  document.getElementById('pinInput').value = '';

}

function loginOperator(){

  var pin =
    document.getElementById('pinInput').value;

  if (pin === "1234") {

  // langsung kosongkan PIN setelah berhasil login
  document.getElementById('pinInput').value = '';

    document
      .getElementById('wrapperLogin')
      .classList.add('d-none');

    document
      .getElementById('wrapperDashboard')
      .classList.remove('d-none');

    muatDataInstan();

  } else {

    Swal.fire({
      icon:'error',
      title:'PIN Salah!'
    });

  }

}

/* =========================
   LOAD DATA
========================= */

// Variabel global untuk menyimpan jumlah data tamu sebelumnya
var jumlahTamuSebelumnya = -1; 

function muatDataInstan(){
  var container = document.getElementById('containerListTamu');

  // Jika ini pertama kali dibuka, tampilkan loading spinner biasa
  if (jumlahTamuSebelumnya === -1) {
    container.innerHTML = `
      <div class="text-center p-4">
        <div class="spinner-border text-primary"></div>
        <div class="small text-muted mt-2">Mengambil data...</div>
      </div>
    `;
  }

  google.script.run
    .withSuccessHandler(function(data){
      if(!data || data.length === 0){
        container.innerHTML = `
          <div class="alert alert-light text-center border py-4">Belum ada data tamu</div>
        `;
        jumlahTamuSebelumnya = 0;
        return;
      }

      // Cek apakah ada tamu baru yang masuk
      // Jika jumlah data sekarang lebih banyak dari jumlah data sebelumnya, bunyikan notifikasi!
      if (jumlahTamuSebelumnya !== -1 && data.length > jumlahTamuSebelumnya) {
        // Ambil data tamu paling terakhir/terbaru dimasukkan
        var tamuTerbaru = data[data.length - 1]; 
        
        // PANGGIL SUARA NOTIFIKASI DI SINI
        mainkanSuaraNotifikasi(tamuTerbaru.nama);
      }

      // Perbarui jumlah data tamu di memori browser
      jumlahTamuSebelumnya = data.length;

      // Render data seperti biasa ke layar
      renderDataCepat(data);
    })
    .ambilDataKilat();
}

/* =========================
   FUNGSI SUARA NOTIFIKASI
========================= */
function mainkanSuaraNotifikasi(namaTamu) {
  // 1. Bunyi Bel "Ding" Pertama (Menggunakan Audio Sintetis Browser)
  var context = new (window.AudioContext || window.webkitAudioContext)();
  var oscillator = context.createOscillator();
  var gainNode = context.createGain();
  
  oscillator.connect(gainNode);
  gainNode.connect(context.destination);
  
  oscillator.type = 'sine';
  oscillator.frequency.setValueAtTime(587.33, context.currentTime); // Nada D5 (Efek bel manis)
  gainNode.gain.setValueAtTime(0.5, context.currentTime);
  gainNode.gain.exponentialRampToValueAtTime(0.01, context.currentTime + 0.4);
  
  oscillator.start();
  oscillator.stop(context.currentTime + 0.4);

  // 2. Suara Robot Berbicara (Text-to-Speech Bahasa Indonesia) setelah Jeda 0,5 Detik
  setTimeout(function() {
    if ('speechSynthesis' in window) {
      var teks = "Tamu baru telah terdaftar. Atas nama " + namaTamu;
      var ruteSuara = new SpeechSynthesisUtterance(teks);
      
      ruteSuara.lang = 'id-ID'; // Mengatur agar robot berbicara bahasa Indonesia
      ruteSuara.rate = 1.0;     // Kecepatan berbicara (1.0 = normal)
      ruteSuara.pitch = 1.0;    // Nada suara robot
      
      window.speechSynthesis.speak(ruteSuara);
    }
  }, 500);
}

/* =========================
   RENDER DATA
========================= */

function renderDataCepat(data){
  var container = document.getElementById('containerListTamu');
  const fragment = document.createDocumentFragment();

  data.forEach(function(tamu){
    if(!tamu.nama) return;

    const card = document.createElement('div');
    card.className = 'card card-kustom p-3 mb-3 bg-white list-item-tamu';
    card.id = 'kartu-' + tamu.rowNum;

    // Menentukan warna badge berdasarkan status disposisi
    let statusBadgeColor = 'bg-secondary';
    let statusTeks = tamu.disposisi || 'Menunggu Antrean';
    
    if (statusTeks.includes('Diterima')) statusBadgeColor = 'bg-success';
    if (statusTeks.includes('Disposisi')) statusBadgeColor = 'bg-warning text-dark';

    card.innerHTML = `
      <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
        <div class="flex-grow-1 pe-2" style="min-width: 250px;">
          <h5 class="mb-1">
            <strong>${escapeHtml(tamu.nama)}</strong>
            <span class="text-muted small">(${escapeHtml(tamu.instansi)})</span>
          </h5>

          <div class="d-flex gap-2 flex-wrap mb-2">
            <span class="badge badge-time rounded-pill">🕒 ${escapeHtml(tamu.waktu)}</span>
            <span class="badge ${statusBadgeColor} rounded-pill" id="badge-status-${tamu.rowNum}">📌 ${escapeHtml(statusTeks)}</span>
          </div>

          <p class="mb-1 text-secondary" style="font-size: 0.95rem;">
            <b>Keperluan:</b> ${escapeHtml(tamu.keperluan)}
          </p>

          <small class="text-success fw-medium">
            <b>WA:</b> 
            <a href="https://wa.me/${escapeHtml(tamu.wa)}" target="_blank" class="text-success text-decoration-none">${escapeHtml(tamu.wa)} ↗️</a>
          </small>
        </div>

        <div class="d-flex flex-column gap-1 align-items-end justify-content-start text-end">
          <label class="small fw-bold text-muted mb-1">Aksi Disposisi:</label>
          <div class="btn-group btn-group-sm mb-2">
            <button class="btn btn-outline-success" onclick="updateDisposisi('${tamu.rowNum}', 'Diterima Atasan')">✔️ Terima</button>
            <button class="btn btn-outline-warning text-dark" onclick="pilihBidangDisposisi('${tamu.rowNum}')">🔀 Bidang</button>
          </div>
          <button class="btn btn-sm btn-light text-danger rounded-pill px-3" onclick="aksiHapusSatu('${tamu.rowNum}')">Hapus</button>
        </div>
      </div>
    `;

    fragment.appendChild(card);
  });

  container.innerHTML = '';
  container.appendChild(fragment);
}

/* =========================
   FUNGSI UPDATE DISPOSISI
========================= */

/* =========================
   FUNGSI INPUT DISPOSISI BEBAS (KETIK MANUAL)
========================= */

function pilihBidangDisposisi(rowNum) {
  Swal.fire({
    title: 'Masukkan Arahan / Tujuan Disposisi',
    input: 'text',
    inputPlaceholder: 'Contoh: Bidang Pemasaran, Meja 3, Pak Budi, dll...',
    showCancelButton: true,
    confirmButtonColor: '#3a7bd5',
    confirmButtonText: 'Kirim Disposisi',
    cancelButtonText: 'Batal',
    inputValidator: (value) => {
      if (!value || value.trim() === "") {
        return 'Kolom disposisi tidak boleh kosong!';
      }
    }
  }).then((result) => {
    if (result.isConfirmed) {
      // Menambahkan teks "Disposisi: " di depan inputan user agar rapi
      var teksDisposisi = "Disposisi: " + result.value.trim();
      updateDisposisi(rowNum, teksDisposisi);
    }
  });
}

// Fungsi utama untuk menembak data ke Google Apps Script (Code.gs)
function updateDisposisi(rowNum, statusBaru) {
  // 1. UBAH TAMPILAN SECARA INSTAN DI LAYAR (Tanpa Nunggu Server)
  const badge = document.getElementById('badge-status-' + rowNum);
  if (badge) {
    badge.innerText = '📌 ' + statusBaru;
    
    // Ganti warna badge secara instan di browser
    badge.className = 'badge rounded-pill'; // Reset class
    if (statusBaru.includes('Diterima')) {
      badge.classList.add('bg-success');
    } else if (statusBaru.includes('Disposisi')) {
      badge.classList.add('bg-warning', 'text-dark');
    } else {
      badge.classList.add('bg-secondary');
    }
  }

  // 2. KIRIM DATA KE GOOGLE SHEETS DI LATAR BELAKANG
  google.script.run
    .withSuccessHandler(function(res) {
      if (res === "SUKSES") {
        // Tampilkan notifikasi kecil di pojok (Toast) agar tidak mengganggu
        const Toast = Swal.mixin({
          toast: true,
          position: 'top-end',
          showConfirmButton: false,
          timer: 2000,
          timerProgressBar: true
        });
        Toast.fire({
          icon: 'success',
          title: 'Database Sheets berhasil diperbarui'
        });
        
        // CATATAN: KITA TIDAK MEMANGGIL muatDataInstan() LAGI DI SINI
        // Agar browser tidak perlu download ulang seluruh data tamu.
      } else {
        Swal.fire('Gagal Sinkronisasi', 'Data gagal disimpan ke Sheets: ' + res, 'error');
        muatDataInstan(); // Baru reload jika ternyata error/gagal jaringan
      }
    })
    .simpanDisposisiSheets(rowNum, statusBaru);
}


/* =========================
   SEARCH
========================= */

function cariData(){

  var keyword =
    document.getElementById('searchInput')
    .value
    .toLowerCase();

  var cards =
    document.querySelectorAll('.list-item-tamu');

  cards.forEach(function(card){

    var isi =
      card.innerText.toLowerCase();

    if(isi.indexOf(keyword) > -1){

      card.style.display = '';

    } else {

      card.style.display = 'none';

    }

  });

}

/* =========================
   ESCAPE HTML
========================= */

function escapeHtml(text){

  if(!text) return '';

  return text
    .toString()
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");

}

/* =========================
   HAPUS SATU
========================= */

function aksiHapusSatu(rowNum){

  Swal.fire({
    title:'Hapus Data?',
    icon:'warning',
    showCancelButton:true,
    confirmButtonColor:'#d33',
    confirmButtonText:'Ya'
  })

  .then((result)=>{

    if(result.isConfirmed){

      var elemen =
        document.getElementById('kartu-' + rowNum);

      elemen.style.opacity = "0.3";

      google.script.run

      .withSuccessHandler(function(res){

        if(res === "SUKSES"){

          elemen.remove();

        }

      })

      .hapusSatuTamu(rowNum);

    }

  });

}

/* =========================
   HAPUS SEMUA
========================= */

function aksiHapusSemua(){

  Swal.fire({
    title:'Kosongkan Semua?',
    icon:'error',
    showCancelButton:true,
    confirmButtonColor:'#dc3545'
  })

  .then((result)=>{

    if(result.isConfirmed){

      var container =
        document.getElementById('containerListTamu');

      container.innerHTML = `
        <div class="text-center border py-4">
          Membersihkan...
        </div>
      `;

      google.script.run

      .withSuccessHandler(function(res){

        if(res === "SUKSES"){

          container.innerHTML = `
            <div class="alert alert-light text-center border py-4">
              Database bersih.
            </div>
          `;

        }

      })

      .hapusSemuaTamu();

    }

  });

}

// Jalankan pengecekan data otomatis setiap 10 detik (10000 milidetik)
// Khusus berjalan ketika Panel Kontrol/Dashboard Operator sedang terbuka
setInterval(function() {
  var dashboard = document.getElementById('wrapperDashboard');
  // Hanya mengecek jika halaman dashboard sedang tidak tersembunyi (d-none tidak ada)
  if (dashboard && !dashboard.classList.contains('d-none')) {
    muatDataInstan();
  }
}, 10000);


</script>

</body>
</html>
